# TRex test configuration

# TRex server
server = "127.0.0.1"

# Forward direction (port 0 → port 1)
src-mac = "0c:42:a1:7d:23:c8"
dst-mac = "10:70:fd:87:53:31"
src-ip = "192.0.1.1"
dst-ip = "192.0.2.250"
src-ips = 1
dst-ips = 1
src-port = 4501
dst-port = 5201
src-ports = 1
dst-ports = 1

# Reverse direction (port 1 → port 0)
# Used with --bidir or --rev
rev-dst-mac = "10:70:fd:87:52:f1"
rev-src-mac = "0c:42:a1:7d:23:c9"
# rev-src-ip = ""  # default: dst-ip
rev-dst-ip = "192.0.1.250"

# Test parameters
frame-sizes = [8900]
duration = 10
runs = 5
results-file = "trex_results.json"
priming = false
stats = false

# Direction (mutually exclusive)
# bidir = false  # Enable bidirectional flows (forward + reverse)
# rev = false  # Reverse only (port 1 → port 0)

# Rate (mutually exclusive)
# pps = ""  # Packets per second
# throughput = ""  # Target throughput: G for Gbps, M for Mbps, e.g. 10G, 500M

# Flow range
flows-start = 1
flows-end = 1

